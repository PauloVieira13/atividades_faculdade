<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta — Sabor & Arte</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../CSS/estylo.css">
<link rel="shortcut icon" href="../Imagem/icon.PNG" type="image/x-icon">
</head>
<body>

<!-- NAVBAR -->
<nav>
        <div class="logo">
            <img src="../imagem/icon.PNG" alt="logo" class="icon">
            <h1 class="titulo">Estação do Sabor</h1>
        </div>
         
        <ul>
            <li><a href="../index.html">Início</a></li>
            <li><a href="../Pages/cadastro.html">Cadastro</a></li>
            <li><a href="../Pages/catalogo.html">Cardápio</a></li>
        </ul>
    
    </nav>

<!-- CONTEÚDO -->
<div class="page">
  <div class="card">

    <h1 class="card-title">Criar/Entrar conta</h1>
    <p class="card-subtitle">Preencha seus dados para se cadastrar</p>

    <div class="field">
      <label for="nome">Nome</label>
      <input
        type="text"
        id="nome"
        name="nome"
        placeholder="Seu nome completo"
        autocomplete="name"
      >
    </div>

    <div class="field">
      <label for="email">E-mail</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="seu@email.com"
        autocomplete="email"
      >
    </div>

    <div class="field">
      <label for="senha">Senha</label>
      <div class="input-wrap">
        <input
          type="password"
          id="senha"
          name="senha"
          placeholder="Crie uma senha"
          autocomplete="new-password"
        >
        <!-- Ícone do olho (decorativo, sem JS) -->
        <span class="eye-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </span>
      </div>
    </div>

    <button class="btn-cadastrar" type="submit">Cadastrar/Entrar</button>
  </div>
</div>

</body>
</html>
