      src="../Imagem/pizza_calabresa.jpg"
      alt="Pizza de calabresa"
    >
  </div>

  <div class="info">

    <h1 class="product-title">Pizza de calabresa</h1>

    <div class="price">R$ 35,00</div>

    <div class="add-row">

      <input class="qty-input" type="radio" name="qty" id="qty2">
      <input class="qty-input" type="radio" name="qty" id="qty3">

      <input class="qty-input" type="radio" name="qty" id="qty9">

        <label for="qty1" class="btn-minus">−</label>
        <label for="qty2" class="btn-minus">−</label>
        <label for="qty3" class="btn-minus">−</label>
        <label for="qty4" class="btn-minus">−</label>

        <label for="qty9" class="btn-plus">+</label>
      </div>

      <div>
        <div class="delivery-label">Entrega</div>
        <div class="delivery-time">Entre 30 e 45 minutos para sua região.</div>
